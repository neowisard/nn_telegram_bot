default:
  image: docker:20
  services:
    - name: docker:20-dind
      alias: docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
variables:
  DOCKER_OPTS: "--insecure-registry CI_REGISTRY"
# DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}:${CI_BUILD_REF_NAME}_${CI_COMMIT_SHORT_SHA}



cache:
  key: ${CI_BUILD_REF_NAME}
  paths:
      - images/
#  untracked: true

stages:
  - package
  #- test
  #- release
 #  - deploy



package:
  stage: package
  script:
    #- ls -la client-portal/target
    #- ls -la ./
    - docker build --pull -t $CONTAINER_RELEASE_IMAGE .
    - docker push $CONTAINER_RELEASE_IMAGE
